name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Cancel superseded runs on the same ref (new push / new commit on a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint + typecheck + build + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Lint (ESLint)
        run: npm run lint -- --max-warnings 0

      # `npm run build` = tsc --noEmit && vite build — covers type-checking + bundle.
      - name: Type-check & build
        run: npm run build

      - name: Test (Vitest)
        run: npm test

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 compiles the webview layer on Linux even when bundling is off;
      # duckdb "bundled" also needs a C/C++ toolchain (build-essential).
      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches cargo registry + target — critical: duckdb "bundled" compiles
      # DuckDB from C++ source (~5-8 min cold); this drops warm runs to ~2 min.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test
