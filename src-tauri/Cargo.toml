[package]
name = "toptopduck"
version = "0.1.0"
description = "Local-first AI data analysis desktop tool"
edition = "2021"
rust-version = "1.77"

[lib]
name = "toptopduck_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
duckdb = { version = "1", features = ["bundled"] }
sha2 = "0.10"
anyhow = "1"
tempfile = "3"

[dev-dependencies]
tempfile = "3"

[profile.dev]
incremental = true
